  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "HowTo",
    "name": "How to Make Cannabis Topicals",
    "description": "Step-by-step guide to making cannabis-infused salves, balms, and lotions at home for targeted pain relief without any psychoactive effects.",
    "totalTime": "PT5H",
    "supply": [
      { "@type": "HowToSupply", "name": "7-10 grams of cannabis flower (or trim/shake)" },
      { "@type": "HowToSupply", "name": "1 cup of coconut oil (or olive oil)" },
      { "@type": "HowToSupply", "name": "1/3 cup of beeswax pellets" },
      { "@type": "HowToSupply", "name": "Essential oils (lavender, peppermint, eucalyptus) - optional" },
      { "@type": "HowToSupply", "name": "Cheesecloth or fine mesh strainer" },
      { "@type": "HowToSupply", "name": "Double boiler or slow cooker" },
      { "@type": "HowToSupply", "name": "Small jars or tins for storage" }
    ],
    "step": [
      {
        "@type": "HowToStep",
        "name": "Decarboxylate your cannabis",
        "text": "Spread your ground cannabis evenly on a parchment-lined baking sheet and bake at 240°F (115°C) for 30-40 minutes. The flower should turn from green to a light golden brown. This converts THCA and CBDA into their active forms, THC and CBD.",
        "position": 1
      },
      {
        "@type": "HowToStep",
        "name": "Infuse the oil",
        "text": "Combine the decarboxylated cannabis and coconut oil in a double boiler or slow cooker. Heat on low (around 160-180°F / 70-80°C) for 2 to 4 hours, stirring occasionally. Do not let the mixture boil.",
        "position": 2
      },
      {
        "@type": "HowToStep",
        "name": "Strain the plant material",
        "text": "Strain the oil through cheesecloth or a fine mesh strainer into a clean container. Squeeze out as much oil as you can from the plant material. Discard the leftover flower.",
        "position": 3
      },
      {
        "@type": "HowToStep",
        "name": "Add beeswax and set the salve",
        "text": "Return the strained cannabis oil to the double boiler over low heat. Add the beeswax pellets and stir until fully melted and combined. Optionally add essential oils for scent and additional therapeutic benefits.",
        "position": 4
      },
      {
        "@type": "HowToStep",
        "name": "Pour and cool",
        "text": "Pour the mixture into small jars or tins while still warm and liquid. Let them cool at room temperature until solidified. Store in a cool, dark place.",
        "position": 5
      }
    ]
  }
  </script>
