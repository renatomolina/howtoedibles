        }

        "name": "What is THCV and does it suppress appetite?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "THCV (tetrahydrocannabivarin) is a minor cannabinoid found in certain cannabis strains, particularly African sativas like Durban Poison. Unlike THC, THCV acts as a CB1 receptor antagonist at low doses, meaning it blocks rather than activates hunger signals. Early research suggests THCV may reduce appetite, improve blood sugar regulation, and support weight management."
