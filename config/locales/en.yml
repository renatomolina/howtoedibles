  do_title: "DO!"
  do_content_1: "Eat a small amount at a time, and wait an hour or more between doses."
  do_content_2: "Eat real food before you try an edible."
  do_content_3: "Remember that eating cannabis is much stronger than smoking it."
  do_content_4: "Be aware that edibles can take up to an hour to kick in."
  do_content_5: "If you got anxious, try to stay calm, nobody overdose from cannabis ever."
  dont_title: "DON'T"
  dont_content_1: "Don't eat pot food too quickly. Start small and low."
  dont_content_2: "Don't drink alcohol or use others drugs."
  dont_content_3: "Don't try to get as high as possible. It's not a competition."
  dont_content_4: "Don't take cannabis food with empty stomach."
  dont_content_5: "Don't get dehydrated, make sure to drink water."
