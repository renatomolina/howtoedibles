          "@type": "Answer",
          "text": "Use the formula: P = 10 x G x S x E / N, where G is grams of cannabis, S is THC strength percentage, E is cooking efficiency (typically 0.80), and N is number of servings. The result P is milligrams of THC per portion."

          "@type": "Answer",
          "text": "Cooking efficiency accounts for THC lost during decarboxylation and infusion. A typical home cook loses about 20% of theoretical THC, so the standard efficiency factor is 80% (0.80). This gives a more realistic estimate of actual potency."
        }
      },
